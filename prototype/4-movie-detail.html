<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: {
                            900: '#121212',
                            800: '#1e1e1e',
                            700: '#2d2d2d',
                            600: '#3d3d3d',
                        },
                        brand: {
                            500: '#e50914', // Netflix-like red for accents if needed, though strictly requested basic
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Roboto', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script> window.FontAwesomeConfig = { autoReplaceSvg: 'nest'};</script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #121212; color: #ffffff; }
        ::-webkit-scrollbar { display: none; }
        
        /* Custom Checkbox Styling for Material look in dark mode */
        .custom-checkbox {
            appearance: none;
            background-color: transparent;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.5em;
            height: 1.5em;
            border: 2px solid #757575;
            border-radius: 4px;
            display: grid;
            place-content: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
        }

        .custom-checkbox::before {
            content: "";
            width: 0.8em;
            height: 0.8em;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em #ffffff;
            background-color: transform;
            transform-origin: center;
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        .custom-checkbox:checked {
            background-color: #e50914; /* Accent color */
            border-color: #e50914;
        }

        .custom-checkbox:checked::before {
            transform: scale(1);
        }
    </style>
</head>
<body class="antialiased min-h-screen bg-dark-900 text-white">

    <!-- Responsive Container -->
    <div id="app-container" class="max-w-7xl mx-auto px-0 sm:px-6 lg:px-8 bg-dark-900 min-h-screen shadow-2xl relative flex flex-col">
        
        <!-- Top App Bar -->
        <header id="top-bar" class="flex items-center justify-between px-4 md:px-6 py-4 bg-dark-900/90 backdrop-blur-sm sticky top-0 z-50 border-b border-dark-700/50">
            <div class="flex items-center">
                <button class="text-white hover:bg-dark-700 p-2 rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-brand-500">
                    <i class="fa-solid fa-arrow-left text-xl"></i>
                </button>
                <h1 class="text-lg md:text-xl font-medium truncate ml-4">Movie Details</h1>
            </div>
            <!-- Desktop Nav Placeholder -->
            <nav class="hidden md:flex space-x-6 text-sm font-medium text-gray-400">
                <a href="#" class="hover:text-white transition-colors">Browse</a>
                <a href="#" class="hover:text-white transition-colors">Community</a>
                <a href="#" class="hover:text-white transition-colors">Profile</a>
            </nav>
            <button class="md:hidden text-white p-2">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
        </header>

        <!-- Main Scrollable Content -->
        <main id="main-content" class="flex-1 pb-8">
            
            <!-- Movie Header Section -->
            <section id="movie-header" class="relative flex flex-col md:flex-row md:items-end md:gap-8 md:p-8">
                <!-- Backdrop/Poster Container -->
                <div class="w-full md:w-1/3 lg:w-1/4 aspect-[2/3] relative bg-dark-800 rounded-b-3xl md:rounded-3xl overflow-hidden shadow-2xl">
                    <img class="w-full h-full object-cover" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/5c9f91c4a9-83be7a970657c456378b.png" alt="epic sci-fi movie poster, cinematic lighting, space battle theme, professional digital art style" />
                    <!-- Gradient overlay for mobile -->
                    <div class="absolute inset-0 bg-gradient-to-t from-dark-900 via-transparent to-transparent md:hidden"></div>
                </div>

                <!-- Title & Meta -->
                <div class="px-6 md:px-0 mt-6 md:mt-0 relative z-10 flex-1">
                    <h2 class="text-3xl md:text-4xl lg:text-5xl font-bold text-white mb-3 leading-tight">The Empire Strikes Back</h2>
                    <div class="flex flex-wrap items-center text-gray-400 text-sm md:text-base gap-3 mb-6">
                        <span>1980</span>
                        <span class="w-1 h-1 bg-gray-500 rounded-full"></span>
                        <span>2h 4m</span>
                        <span class="w-1 h-1 bg-gray-500 rounded-full"></span>
                        <span>Sci-Fi, Action</span>
                    </div>
                </div>
            </section>

            <!-- Grid Layout for Desktop Content -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 px-6 md:px-8 mt-8">
                <!-- User Actions (Checkboxes/Toggles) -->
                <section id="user-actions" class="bg-dark-800/30 p-6 rounded-2xl border border-dark-700/50">
                    <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-6">Your Collection Status</h3>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
                        <label class="flex items-center justify-between group cursor-pointer p-3 rounded-lg hover:bg-dark-700/50 transition-colors border border-transparent hover:border-dark-600">
                            <span class="text-base font-medium text-gray-200">Watched</span>
                            <input type="checkbox" class="custom-checkbox" checked>
                        </label>

                        <label class="flex items-center justify-between group cursor-pointer p-3 rounded-lg hover:bg-dark-700/50 transition-colors border border-transparent hover:border-dark-600">
                            <span class="text-base font-medium text-gray-200">Want to watch</span>
                            <input type="checkbox" class="custom-checkbox">
                        </label>

                        <label class="flex items-center justify-between group cursor-pointer p-3 rounded-lg hover:bg-dark-700/50 transition-colors border border-transparent hover:border-dark-600">
                            <span class="text-base font-medium text-gray-200">Own on Physical Media</span>
                            <input type="checkbox" class="custom-checkbox" checked>
                        </label>

                        <label class="flex items-center justify-between group cursor-pointer p-3 rounded-lg hover:bg-dark-700/50 transition-colors border border-transparent hover:border-dark-600">
                            <span class="text-base font-medium text-gray-200">Available for Trade</span>
                            <input type="checkbox" class="custom-checkbox">
                        </label>
                    </div>
                </section>

                <!-- Community Section -->
                <section id="community-list" class="bg-dark-800/30 p-6 rounded-2xl border border-dark-700/50">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-base md:text-lg font-semibold text-white">Available from Community</h3>
                        <span class="text-xs text-gray-400 bg-dark-700 px-2 py-1 rounded">Physical Copies</span>
                    </div>
                    
                    <div class="space-y-3">
                        <!-- User Item 1 -->
                        <div class="flex items-center p-3 rounded-lg bg-dark-900/50 border border-dark-700/30 hover:border-brand-500/50 transition-colors">
                            <img class="w-10 h-10 rounded-full object-cover border border-dark-600" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/de0d5ea9f9-1769a87f35ebfea614b3.png" alt="diverse male portrait, professional headshot, smiling" />
                            <div class="ml-3 flex-1">
                                <p class="text-sm font-medium text-gray-200">Alex Chen</p>
                                <p class="text-xs text-gray-500">Blu-Ray • Excellent Condition</p>
                            </div>
                            <button class="text-xs font-semibold text-brand-500 hover:underline">Contact</button>
                        </div>

                        <!-- User Item 2 -->
                        <div class="flex items-center p-3 rounded-lg bg-dark-900/50 border border-dark-700/30 hover:border-brand-500/50 transition-colors">
                            <img class="w-10 h-10 rounded-full object-cover border border-dark-600" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/2066ff5c2a-aa8d420aec8504ca373e.png" alt="diverse female portrait, professional headshot, smiling" />
                            <div class="ml-3 flex-1">
                                <p class="text-sm font-medium text-gray-200">Sarah Jenkins</p>
                                <p class="text-xs text-gray-500">DVD • Good Condition</p>
                            </div>
                            <button class="text-xs font-semibold text-brand-500 hover:underline">Contact</button>
                        </div>

                        <!-- User Item 3 -->
                        <div class="flex items-center p-3 rounded-lg bg-dark-900/50 border border-dark-700/30 hover:border-brand-500/50 transition-colors">
                            <img class="w-10 h-10 rounded-full object-cover border border-dark-600" src="https://storage.googleapis.com/uxpilot-auth.appspot.com/de0d5ea9f9-1769a87f35ebfea614b3.png" alt="diverse male portrait, professional headshot, smiling" />
                            <div class="ml-3 flex-1">
                                <p class="text-sm font-medium text-gray-200">Marcus Johnson</p>
                                <p class="text-xs text-gray-500">Blu-Ray • Still Sealed</p>
                            </div>
                            <button class="text-xs font-semibold text-brand-500 hover:underline">Contact</button>
                        </div>
                    </div>

                    <!-- Empty State Example (Hidden by default, shown if list is empty) -->
                    <!-- 
                    <div class="text-center py-8">
                        <i class="fa-regular fa-folder-open text-4xl text-dark-600 mb-3"></i>
                        <p class="text-gray-400 text-sm">No users currently have this available.</p>
                    </div> 
                    -->

                </section>

            </div>

        </main>
    </div>

</body>
</html>
